<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #e0f7fa; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: white; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { margin-top: 20px; padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Reimagine</h1>
        <p>Upload photos to declutter your space</p>
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button onclick="alert('AI is starting!')">Reimagine Room</button>
    </div>
</body>
</html>
